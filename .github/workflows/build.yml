name: Build & Package

# Triggers: every push/PR to main or the feature branch, and manual dispatch
on:
  push:
    branches: [ main, "copilot/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SOLUTION: SharkeyWinUI.sln
  PROJECT: SharkeyWinUI/SharkeyWinUI.csproj
  CONFIGURATION: Release
  RUNTIME: win-x64

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: windows-latest   # WinUI 3 requires a Windows runner
    permissions:
      contents: read

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history for version stamping

      # 2. Set up .NET 10 SDK (global.json in the repo also enforces this)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # NOTE: The Windows App SDK is delivered via the Microsoft.WindowsAppSDK
      # NuGet package (v1.5+). A separate 'dotnet workload install' step is NOT
      # required and has been intentionally removed — the workload ID changed
      # between SDK generations and is unreliable on hosted runners.

      # 3. Cache NuGet packages
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # 4. Restore
      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }} -p:Platform=x64

      # 5. Build (no MSIX generation — that is handled by the package job)
      - name: Build
        run: >
          dotnet build ${{ env.PROJECT }}
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          -p:Platform=x64
          -p:RuntimeIdentifier=${{ env.RUNTIME }}
          -p:AppxPackageSigningEnabled=false
          -p:GenerateAppxPackageOnBuild=false

      # 6. Run tests — skip gracefully when no test projects exist
      - name: Test
        shell: pwsh
        env:
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
        run: |
          $testProjects = Get-ChildItem -Recurse -Filter "*.csproj" |
            Where-Object { (Get-Content $_.FullName -Raw) -match "Microsoft\.NET\.Test\.Sdk|xunit|NUnit|MSTest" }
          if ($testProjects.Count -gt 0) {
            $failed = $false
            foreach ($proj in $testProjects) {
              Write-Host "Running tests for $($proj.FullName)..."
              dotnet test $proj.FullName `
                --configuration ${{ env.CONFIGURATION }} `
                --no-build `
                --verbosity normal `
                --logger "trx;LogFileName=test-results-$($proj.BaseName).trx"
              if ($LASTEXITCODE -ne 0) {
                $failed = $true
              }
            }
            if ($failed) {
              exit 1
            }
          } else {
            Write-Host "No test projects found — skipping tests."
          }

      # 7. Upload test results (if any were produced)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  package:
    name: Package MSIX
    runs-on: windows-latest
    needs: build
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      signing_available: ${{ steps.signing_preflight.outputs.signing_available }}
      signing_label: ${{ steps.signing_preflight.outputs.signing_label }}
    permissions:
      contents: read
    # Allow PRs to produce MSIX artifacts; still gate releases to tags
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # NOTE: No 'dotnet workload install' — see build job comment above.

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }} -p:Platform=x64

      # Compute a version number: use the git tag (vX.Y.Z) or fall back to 0.0.1
      - name: Compute version
        id: version
        shell: pwsh
        run: |
          $tag = (git describe --tags --abbrev=0 2>$null) -replace '^v',''
          if (-not $tag) { $tag = "0.0.1" }
          $build = "${{ github.run_number }}"
          $version = "$tag.$build"
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"
          exit 0

      - name: Detect signing availability
        id: signing_preflight
        shell: pwsh
        env:
          PACKAGE_CERT_PFX_BASE64: ${{ secrets.PACKAGE_CERT_PFX_BASE64 }}
          PACKAGE_CERT_PASSWORD: ${{ secrets.PACKAGE_CERT_PASSWORD }}
          PACKAGE_CERT_SUBJECT: ${{ secrets.PACKAGE_CERT_SUBJECT }}
        run: |
          $hasPfx = -not [string]::IsNullOrWhiteSpace($env:PACKAGE_CERT_PFX_BASE64)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:PACKAGE_CERT_PASSWORD)
          $signingAvailable = $hasPfx -and $hasPassword
          $signingReason = "missing-secrets"

          if ($signingAvailable) {
            try {
              $rawPfx = [Convert]::FromBase64String($env:PACKAGE_CERT_PFX_BASE64)
              $flags = [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
              $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($rawPfx, $env:PACKAGE_CERT_PASSWORD, $flags)
              if ($null -eq $cert -or [string]::IsNullOrWhiteSpace($cert.Subject)) {
                throw "Certificate could not be loaded from PFX."
              }
              if (-not $cert.HasPrivateKey) {
                throw "Certificate does not contain a private key."
              }
              $hasCodeSigningEku = $false
              foreach ($ext in $cert.Extensions) {
                if ($ext -is [System.Security.Cryptography.X509Certificates.X509EnhancedKeyUsageExtension]) {
                  foreach ($oid in $ext.EnhancedKeyUsages) {
                    if ($oid.Value -eq "1.3.6.1.5.5.7.3.3") {
                      $hasCodeSigningEku = $true
                    }
                  }
                }
              }
              if (-not $hasCodeSigningEku) {
                throw "Certificate is missing the Code Signing EKU (1.3.6.1.5.5.7.3.3)."
              }
              $signingReason = "validated"
              Write-Host "Signing certificate preflight succeeded: $($cert.Subject)"
            } catch {
              $signingAvailable = $false
              $signingReason = "invalid-cert-or-password"
              Write-Warning "Signing preflight failed ($($_.Exception.Message)). Falling back to unsigned artifacts."
            }
          }

          $signingLabel = if ($signingAvailable) { "signed" } else { "unsigned" }
          $hasSubject = -not [string]::IsNullOrWhiteSpace($env:PACKAGE_CERT_SUBJECT)
          $subjectValidation = if ($hasSubject) { "enabled" } else { "skipped" }

          if ($signingAvailable) {
            Write-Host "Signing secrets detected; signed artifacts will be produced."
          } else {
            Write-Warning "Signing secrets are missing; producing unsigned artifacts."
          }

          if ($subjectValidation -eq "enabled") {
            Write-Host "Publisher subject validation is enabled."
          } else {
            Write-Warning "Publisher subject validation is skipped (PACKAGE_CERT_SUBJECT not set)."
          }

          "signing_available=$($signingAvailable.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "signing_label=$signingLabel" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "signing_reason=$signingReason" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "subject_validation=$subjectValidation" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Validate manifest publisher subject
        if: steps.signing_preflight.outputs.signing_available == 'true' && steps.signing_preflight.outputs.subject_validation == 'enabled'
        shell: pwsh
        env:
          PACKAGE_CERT_SUBJECT: ${{ secrets.PACKAGE_CERT_SUBJECT }}
        run: |
          [xml]$manifest = Get-Content "./SharkeyWinUI/Package.appxmanifest"
          $manifestPublisher = $manifest.Package.Identity.Publisher
          if ($manifestPublisher -ne $env:PACKAGE_CERT_SUBJECT) {
            throw "Package.appxmanifest publisher '$manifestPublisher' does not match PACKAGE_CERT_SUBJECT '$($env:PACKAGE_CERT_SUBJECT)'."
          }
          Write-Host "Manifest publisher matches PACKAGE_CERT_SUBJECT."

      - name: Materialize signing certificate
        id: import_cert
        if: steps.signing_preflight.outputs.signing_available == 'true'
        shell: pwsh
        env:
          PACKAGE_CERT_PFX_BASE64: ${{ secrets.PACKAGE_CERT_PFX_BASE64 }}
          PACKAGE_CERT_PASSWORD: ${{ secrets.PACKAGE_CERT_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:PACKAGE_CERT_PFX_BASE64))
          $securePassword = ConvertTo-SecureString $env:PACKAGE_CERT_PASSWORD -AsPlainText -Force
          $imported = Import-PfxCertificate -FilePath $certPath -Password $securePassword -CertStoreLocation "Cert:\CurrentUser\My"
          if ($null -eq $imported -or [string]::IsNullOrWhiteSpace($imported.Thumbprint)) {
            throw "Failed to import signing certificate into CurrentUser\\My store."
          }
          "cert_path=$certPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "cert_thumbprint=$($imported.Thumbprint)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Imported signing certificate with thumbprint $($imported.Thumbprint)."

      # Build a self-contained MSIX for side-loading
      - name: Publish (self-contained signed MSIX)
        if: steps.signing_preflight.outputs.signing_available == 'true'
        run: >
          dotnet publish ${{ env.PROJECT }}
          --configuration ${{ env.CONFIGURATION }}
          --runtime ${{ env.RUNTIME }}
          --self-contained true
          -p:Platform=x64
          -p:PublishSingleFile=false
          -p:WindowsPackageType=MSIX
          -p:AppxPackageDir=${{ github.workspace }}/artifacts/msix/
          -p:GenerateAppxPackageOnBuild=true
          -p:AppxPackageSigningEnabled=true
          -p:PackageCertificateThumbprint=${{ steps.import_cert.outputs.cert_thumbprint }}
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output ./artifacts/publish

      - name: Publish (self-contained unsigned MSIX)
        if: steps.signing_preflight.outputs.signing_available != 'true'
        run: >
          dotnet publish ${{ env.PROJECT }}
          --configuration ${{ env.CONFIGURATION }}
          --runtime ${{ env.RUNTIME }}
          --self-contained true
          -p:Platform=x64
          -p:PublishSingleFile=false
          -p:WindowsPackageType=MSIX
          -p:AppxPackageDir=${{ github.workspace }}/artifacts/msix/
          -p:GenerateAppxPackageOnBuild=true
          -p:AppxPackageSigningEnabled=false
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output ./artifacts/publish

      - name: Build portable ZIP
        id: portable_zip
        shell: pwsh
        run: |
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "artifacts/SharkeyWinUI-portable-${{ steps.version.outputs.VERSION }}-${{ steps.signing_preflight.outputs.signing_label }}.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "./artifacts/publish/*" -DestinationPath $zipPath
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Cleanup signing certificate
        if: always() && steps.import_cert.outputs.cert_path != ''
        shell: pwsh
        run: |
          if ("${{ steps.import_cert.outputs.cert_thumbprint }}") {
            Get-ChildItem "Cert:\CurrentUser\My\${{ steps.import_cert.outputs.cert_thumbprint }}" -ErrorAction SilentlyContinue | Remove-Item -Force
          }
          if (Test-Path "${{ steps.import_cert.outputs.cert_path }}") {
            Remove-Item "${{ steps.import_cert.outputs.cert_path }}" -Force
          }

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharkeyWinUI-msix-${{ steps.version.outputs.VERSION }}-${{ steps.signing_preflight.outputs.signing_label }}
          path: ./artifacts/msix/
          if-no-files-found: warn

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharkeyWinUI-zip-${{ steps.version.outputs.VERSION }}-${{ steps.signing_preflight.outputs.signing_label }}
          path: ${{ steps.portable_zip.outputs.zip_path }}
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # needed to create a release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download MSIX artifact
        uses: actions/download-artifact@v4.1.3
        with:
          pattern: SharkeyWinUI-msix-*
          path: ./release-assets
          merge-multiple: true

      - name: Download ZIP artifact
        uses: actions/download-artifact@v4.1.3
        with:
          pattern: SharkeyWinUI-zip-*
          path: ./release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: pwsh
        run: |
          $checksumFile = "./release-assets/SHA256SUMS.txt"
          $lines = Get-ChildItem "./release-assets" -File |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash *$($_.Name)"
            }
          $lines | Out-File -FilePath $checksumFile -Encoding utf8

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/**
          generate_release_notes: true
          body: |
            Asset signing status for this run: `${{ needs.package.outputs.signing_label }}`.
            If status is `unsigned`, signing secrets were unavailable and fallback packaging was used.
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
