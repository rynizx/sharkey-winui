name: Build & Package

# Triggers: every push/PR to main or the feature branch, and manual dispatch
on:
  push:
    branches: [ main, "copilot/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SOLUTION: SharkeyWinUI/SharkeyWinUI.csproj
  CONFIGURATION: Release
  RUNTIME: win-x64

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: windows-latest   # WinUI 3 requires a Windows runner
    permissions:
      contents: read

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history for version stamping

      # 2. Set up .NET 8 SDK (global.json in the repo also enforces this)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # NOTE: The Windows App SDK is delivered via the Microsoft.WindowsAppSDK
      # NuGet package (v1.5+). A separate 'dotnet workload install' step is NOT
      # required and has been intentionally removed — the workload ID changed
      # between SDK generations and is unreliable on hosted runners.

      # 3. Cache NuGet packages
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # 4. Restore
      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }} -p:Platform=x64

      # 5. Build (no MSIX generation — that is handled by the package job)
      - name: Build
        run: >
          dotnet build ${{ env.SOLUTION }}
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          -p:Platform=x64
          -p:RuntimeIdentifier=${{ env.RUNTIME }}
          -p:AppxPackageSigningEnabled=false
          -p:GenerateAppxPackageOnBuild=false

      # 6. Run tests — skip gracefully when no test projects exist
      - name: Test
        shell: pwsh
        env:
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
        run: |
          $testProjects = Get-ChildItem -Recurse -Filter "*.csproj" |
            Where-Object { (Get-Content $_.FullName -Raw) -match "Microsoft\.NET\.Test\.Sdk|xunit|NUnit|MSTest" }
          if ($testProjects.Count -gt 0) {
            $failed = $false
            foreach ($proj in $testProjects) {
              Write-Host "Running tests for $($proj.FullName)..."
              dotnet test $proj.FullName `
                --configuration ${{ env.CONFIGURATION }} `
                --no-build `
                --verbosity normal `
                --logger "trx;LogFileName=test-results-$($proj.BaseName).trx"
              if ($LASTEXITCODE -ne 0) {
                $failed = $true
              }
            }
            if ($failed) {
              exit 1
            }
          } else {
            Write-Host "No test projects found — skipping tests."
          }

      # 7. Upload test results (if any were produced)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  package:
    name: Package MSIX
    runs-on: windows-latest
    needs: build
    permissions:
      contents: read
    # Allow PRs to produce MSIX artifacts; still gate releases to tags
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # NOTE: No 'dotnet workload install' — see build job comment above.

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }} -p:Platform=x64

      # Compute a version number: use the git tag (vX.Y.Z) or fall back to 0.0.1
      - name: Compute version
        id: version
        shell: pwsh
        run: |
          $tag = (git describe --tags --abbrev=0 2>$null) -replace '^v',''
          if (-not $tag) { $tag = "0.0.1" }
          $build = "${{ github.run_number }}"
          $version = "$tag.$build"
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"
          exit 0

      - name: Create signing certificate
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ github.workspace }}/artifacts/msix" -Force | Out-Null
          $password = [guid]::NewGuid().ToString("N")
          Write-Output "::add-mask::$password"
          $securePassword = ConvertTo-SecureString -String $password -Force -AsPlainText
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=SharkeyWinUI" -CertStoreLocation "Cert:\CurrentUser\My"
          Export-PfxCertificate -Cert $cert -FilePath "${{ runner.temp }}/SharkeyWinUI.pfx" -Password $securePassword | Out-Null
          Export-Certificate -Cert $cert -FilePath "${{ github.workspace }}/artifacts/msix/SharkeyWinUI.cer" | Out-Null
          "MSIX_CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MSIX_CERT_PATH=${{ runner.temp }}/SharkeyWinUI.pfx" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MSIX_CERT_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Append
          $password = $null

      # Build a self-contained MSIX for side-loading
      - name: Publish (self-contained MSIX)
        shell: pwsh
        run: |
          dotnet publish ${{ env.SOLUTION }} `
            --configuration ${{ env.CONFIGURATION }} `
            --runtime ${{ env.RUNTIME }} `
            --self-contained true `
            -p:Platform=x64 `
            -p:PublishSingleFile=false `
            -p:WindowsPackageType=MSIX `
            -p:AppxPackageDir=${{ github.workspace }}/artifacts/msix/ `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxPackageSigningEnabled=true `
            -p:PackageCertificateKeyFile="${{ env.MSIX_CERT_PATH }}" `
            -p:PackageCertificatePassword=$env:MSIX_CERT_PASSWORD `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            --output ./artifacts/publish

      - name: Clean up signing certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:MSIX_CERT_THUMBPRINT) {
            try {
              Remove-Item "Cert:\CurrentUser\My\$env:MSIX_CERT_THUMBPRINT" -ErrorAction Stop
            } catch {
              Write-Warning "Failed to remove signing cert $env:MSIX_CERT_THUMBPRINT: $($_.Exception.Message)"
            }
          }
          if (Test-Path "${{ runner.temp }}/SharkeyWinUI.pfx") {
            Remove-Item "${{ runner.temp }}/SharkeyWinUI.pfx" -Force
          }

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharkeyWinUI-msix-${{ steps.version.outputs.VERSION }}
          path: ./artifacts/msix/
          if-no-files-found: warn

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharkeyWinUI-publish-${{ steps.version.outputs.VERSION }}
          path: ./artifacts/publish/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # needed to create a release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download MSIX artifact
        uses: actions/download-artifact@v4.1.3
        with:
          pattern: SharkeyWinUI-msix-*
          path: ./release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/**
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
