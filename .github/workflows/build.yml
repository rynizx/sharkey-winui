name: Build & Package

# Triggers: every push/PR to main or the feature branch, and manual dispatch
on:
  push:
    branches: [ main, "copilot/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Allow creating releases from tags
env:
  SOLUTION: SharkeyWinUI/SharkeyWinUI.csproj
  CONFIGURATION: Release
  TFM: net8.0-windows10.0.19041.0
  RUNTIME: win-x64

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: windows-latest   # WinUI 3 requires a Windows runner
    permissions:
      contents: read

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history for version stamping

      # 2. Install the Windows App SDK workload
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Windows App SDK workload
        run: dotnet workload install microsoft-net-sdk-windowsappsdk

      # 3. Cache NuGet packages
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # 4. Restore
      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      # 5. Build
      - name: Build
        run: >
          dotnet build ${{ env.SOLUTION }}
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          -p:RuntimeIdentifier=${{ env.RUNTIME }}

      # 6. Run tests (if any test projects exist)
      - name: Test
        run: >
          dotnet test
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
        continue-on-error: false  # fail the build if tests fail
        # Only runs if test projects are found; skip gracefully if there are none
        shell: pwsh
        env:
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

      # 7. Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  package:
    name: Package MSIX
    runs-on: windows-latest
    needs: build
    permissions:
      contents: read
    # Only publish packages from the main branch or version tags
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Windows App SDK workload
        run: dotnet workload install microsoft-net-sdk-windowsappsdk

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      # Compute a version number: use the git tag (vX.Y.Z) or a build timestamp
      - name: Compute version
        id: version
        shell: pwsh
        run: |
          $tag = (git describe --tags --abbrev=0 2>$null) -replace '^v',''
          if (-not $tag) { $tag = "0.0.1" }
          $build = "${{ github.run_number }}"
          $version = "$tag.$build"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      # Build a self-contained single-file publish for side-loading
      - name: Publish (self-contained)
        run: >
          dotnet publish ${{ env.SOLUTION }}
          --configuration ${{ env.CONFIGURATION }}
          --runtime ${{ env.RUNTIME }}
          --self-contained true
          -p:PublishSingleFile=false
          -p:WindowsPackageType=MSIX
          -p:AppxPackageDir=./artifacts/msix/
          -p:GenerateAppxPackageOnBuild=true
          -p:AppxPackageSigningEnabled=false
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output ./artifacts/publish

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharkeyWinUI-msix-${{ steps.version.outputs.VERSION }}
          path: ./artifacts/msix/
          if-no-files-found: warn

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharkeyWinUI-publish-${{ steps.version.outputs.VERSION }}
          path: ./artifacts/publish/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # needed to create a release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download MSIX artifact
        uses: actions/download-artifact@v4.1.3
        with:
          pattern: SharkeyWinUI-msix-*
          path: ./release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/**
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
